name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Tag Matches Version
        run: |
          # Extract version from pyproject.toml
          PROJECT_VERSION=$(grep -E '^version\s*=\s*".*"' pyproject.toml | cut -d '"' -f 2)
          # Get tag name (strip refs/tags/ if present)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Remove leading 'v' from tag if present
          CLEAN_TAG=${TAG_NAME#v}
          
          if [ "$CLEAN_TAG" != "$PROJECT_VERSION" ]; then
            echo "Error: Tag version ($CLEAN_TAG) does not match pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi
          echo "Version check passed: $CLEAN_TAG"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
